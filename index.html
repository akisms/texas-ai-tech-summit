<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>From Chat to Code · The 3 Levels of AI · Atmit Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;0,800;1,500&family=Hanken+Grotesk:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@500;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Atmit Labs brand palette */
  --ink:        #06201d;
  --ink-2:      #0a2c27;
  --ink-3:      #103a33;
  --blue:       #27aae1;
  --blue-deep:  #1867a5;
  --green:      #0ad27c;
  --teal:       #05927d;
  --teal-ink:   #066b5c;
  --gray:       #41504c;
  --gray-soft:  #5d6b67;
  --amber:      #e89a2c;
  --cream:      #f6faf8;
  --cream-2:    #edf3f1;
  --white:      #ffffff;
  --line:       rgba(255,255,255,0.12);
  --line-2:     rgba(255,255,255,0.07);
  --line-dark:  rgba(12,42,37,0.14);
  --grad:       linear-gradient(120deg, var(--blue) 0%, var(--green) 100%);
  --grad-soft:  linear-gradient(120deg, rgba(39,170,225,0.16) 0%, rgba(10,210,124,0.16) 100%);
  --ease:       cubic-bezier(.22,.61,.36,1);
  /* z-scale */
  --z-nav: 100; --z-indicator: 90; --z-banner: 95;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;font-size:18px;}
body{
  font-family:'Hanken Grotesk',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
  color:var(--gray);background:var(--ink);
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}
h1,h2,h3,h4,.display{font-family:'Poppins',sans-serif;text-wrap:balance;}
p{text-wrap:pretty;}

/* ── Nav ── */
nav{
  position:fixed;top:0;left:0;right:0;z-index:var(--z-nav);height:62px;padding:0 2.2rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(6,32,29,0.80);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid transparent;transition:border-color .3s,box-shadow .3s;
}
nav.scrolled{border-bottom-color:var(--line);}
.nav-logo{display:flex;align-items:center;text-decoration:none;}
.nav-logo img{height:30px;width:auto;display:block;}
.nav-links{display:flex;gap:1.5rem;list-style:none;align-items:center;}
.nav-links a{color:rgba(255,255,255,0.52);text-decoration:none;font-size:.82rem;font-weight:500;transition:color .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.present-btn{
  padding:.5rem 1.25rem;background:var(--grad);color:#04211b;border:none;border-radius:100px;
  font-size:.78rem;font-weight:700;cursor:pointer;transition:transform .12s var(--ease),filter .2s;
  white-space:nowrap;font-family:'Poppins',sans-serif;
}
.present-btn:hover{filter:brightness(1.08);}
.present-btn:active{transform:scale(.97);}

/* ── Error overlay (shown only if deck.js can't be read) ── */
.deck-error{position:fixed;top:62px;left:0;right:0;z-index:var(--z-banner);background:#3a1414;color:#ffd6d6;padding:1rem 1.6rem;font-family:'Hanken Grotesk',sans-serif;font-size:.9rem;line-height:1.55;border-bottom:1px solid rgba(255,90,90,0.5);}
.deck-error b{color:#fff;}
.deck-error code{font-family:'JetBrains Mono',monospace;font-size:.82rem;color:#ffb0b0;}
html.present-mode .deck-error{display:none;}

/* ── Slide base ── */
.slide{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:6.5rem 3rem 4rem;position:relative;}
.slide-inner{max-width:1180px;margin:0 auto;width:100%;}
.slide.light{background:var(--cream);color:var(--gray);}
.slide.light.warm{background:var(--cream-2);}
.slide.dark{background:var(--ink);color:rgba(255,255,255,0.86);}
.slide.dark.alt{background:linear-gradient(165deg,var(--ink) 0%,var(--ink-2) 100%);}

.section-title{font-size:clamp(2rem,4.2vw,3.05rem);font-weight:700;line-height:1.07;letter-spacing:-.025em;margin-bottom:1.1rem;}
.light .section-title{color:#0c2a25;}
.section-sub{font-size:1.08rem;line-height:1.6;max-width:68ch;opacity:.85;}
.dark .section-sub{opacity:.76;}

/* accent words (solid, not gradient) */
.accent{color:var(--teal-ink);}
.dark .accent,.divider .accent,.demo .accent,.close .accent,.hero .accent{color:var(--green);}

/* ── Motion ── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .7s var(--ease),transform .7s var(--ease);}
.reveal.visible{opacity:1;transform:none;}
.reveal.from-left{transform:translateX(-26px);}
.reveal.from-left.visible{transform:none;}
.reveal.zoom{transform:scale(.94);}
.reveal.zoom.visible{transform:none;}
.d1{transition-delay:.07s;}.d2{transition-delay:.14s;}.d3{transition-delay:.21s;}
.d4{transition-delay:.28s;}.d5{transition-delay:.35s;}.d6{transition-delay:.42s;}
@media (prefers-reduced-motion: reduce){
  .reveal{opacity:1!important;transform:none!important;transition:none!important;}
  html{scroll-behavior:auto;}
}

/* ── 1 · Title ── */
.hero{
  min-height:100vh;display:flex;align-items:center;padding:5rem 3rem;position:relative;overflow:hidden;color:var(--white);
  background:
    radial-gradient(ellipse 68% 58% at 84% 16%, rgba(39,170,225,0.24) 0%, transparent 60%),
    radial-gradient(ellipse 64% 54% at 10% 90%, rgba(10,210,124,0.20) 0%, transparent 62%),
    linear-gradient(165deg,#041a17 0%,#06201d 50%,#0a2c27 100%);
}
.hero::after{content:"";position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0);
  background-size:40px 40px;mask-image:radial-gradient(ellipse 80% 80% at 50% 45%,#000 30%,transparent 75%);}
.hero-inner{max-width:1180px;margin:0 auto;width:100%;position:relative;z-index:2;display:grid;grid-template-columns:1.5fr .85fr;gap:3.5rem;align-items:center;}
.kicker-pill{display:inline-flex;align-items:center;gap:.6rem;font-size:.76rem;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,0.82);border:1px solid var(--line);padding:.45rem .95rem;border-radius:100px;background:rgba(255,255,255,0.03);margin-bottom:1.7rem;}
.kicker-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
.hero h1{font-size:clamp(2.7rem,5.4vw,4.4rem);font-weight:700;line-height:1.02;letter-spacing:-.03em;margin-bottom:1.3rem;}
.hero .lede{font-size:1.22rem;line-height:1.55;color:rgba(255,255,255,0.78);max-width:54ch;margin-bottom:2.2rem;}
.hero-presenter{display:flex;align-items:center;gap:1rem;}
.hero-presenter img{width:62px;height:62px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.18);}
.hero-presenter .pname{font-family:'Poppins';font-weight:600;font-size:1.08rem;color:var(--white);}
.hero-presenter .prole{font-size:.88rem;color:rgba(255,255,255,0.62);}
.hero-art{display:flex;justify-content:center;align-items:center;}
.hero-art img{width:100%;max-width:280px;filter:drop-shadow(0 20px 50px rgba(0,0,0,0.45));}
.hero-hint{margin-top:1.9rem;font-size:.82rem;color:rgba(255,255,255,0.45);}
.hero-hint b{color:var(--green);font-weight:600;}

/* ── 2 · About ── */
.about-grid{display:grid;grid-template-columns:.82fr 1.18fr;gap:3.2rem;align-items:center;}
.about-photo{position:relative;}
.about-photo img{width:100%;border-radius:20px;display:block;box-shadow:0 24px 60px rgba(6,32,29,0.22);}
.about-photo .ribbon{position:absolute;bottom:-14px;left:-14px;background:var(--grad);color:#04211b;font-family:'Poppins';font-weight:700;font-size:.82rem;padding:.55rem 1rem;border-radius:12px;box-shadow:0 12px 28px rgba(6,32,29,0.28);}
.about-lead{font-size:clamp(1.5rem,2.6vw,1.9rem);line-height:1.32;font-family:'Poppins';font-weight:600;color:#0c2a25;margin-bottom:1.3rem;letter-spacing:-.01em;}
.about-body{font-size:1.05rem;line-height:1.65;margin-bottom:1.8rem;max-width:60ch;}
.cred-line{display:flex;gap:2rem;flex-wrap:wrap;border-top:2px solid var(--line-dark);padding-top:1.3rem;}
.cred-line span{font-size:1rem;color:var(--gray-soft);}
.cred-line b{font-family:'Poppins';color:var(--teal-ink);font-weight:700;}

/* ── Table of contents ── */
.toc{display:grid;grid-template-columns:1fr 1fr;gap:1rem 2.6rem;margin-top:1.8rem;}
.toc-row{display:grid;grid-template-columns:48px 1fr;gap:1rem;align-items:baseline;border-top:1px solid var(--line);padding-top:1rem;}
.toc-n{font-family:'JetBrains Mono';font-weight:600;font-size:1rem;color:var(--green);}
.toc-t{font-family:'Poppins';font-weight:600;font-size:1.15rem;color:var(--white);}
.toc-d{font-size:.9rem;color:rgba(255,255,255,0.6);margin-top:.15rem;line-height:1.4;}

/* ── Audience / get-to-know-the-room slide ── */
.qlist{display:flex;flex-direction:column;gap:1.1rem;margin-top:1.8rem;}
.qrow{display:flex;align-items:center;gap:1.3rem;border-top:2px solid var(--line-dark);padding-top:1.1rem;}
.qnum{font-family:'Poppins';font-weight:800;font-size:1.8rem;color:var(--teal-ink);line-height:1;flex-shrink:0;}
.qtext{font-family:'Poppins';font-weight:600;font-size:clamp(1.2rem,2.2vw,1.6rem);color:#0c2a25;line-height:1.25;}
.qcue{margin-top:1.6rem;font-size:1rem;color:var(--gray-soft);font-style:italic;}

/* ── 4/5 · Intention + Bismillah ── */
.lead-statement{font-size:clamp(2.1rem,4.6vw,3.2rem);font-family:'Poppins';font-weight:700;line-height:1.12;letter-spacing:-.025em;color:var(--white);margin-bottom:1.6rem;max-width:18ch;}
.prompt-q{font-size:1.32rem;line-height:1.5;font-family:'Poppins';font-weight:500;max-width:64ch;color:rgba(255,255,255,0.9);margin-bottom:1.8rem;}
.intention-note{font-size:1.12rem;line-height:1.62;max-width:62ch;color:rgba(255,255,255,0.74);border-left:1px solid var(--green);padding-left:1.4rem;}
.intention-note b{color:var(--white);font-weight:600;}

.bismillah{background:radial-gradient(ellipse 58% 58% at 50% 38%, rgba(10,210,124,0.15) 0%, transparent 65%),linear-gradient(165deg,#041a17 0%,#06201d 60%);}
.center-stage{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.arabic{font-size:clamp(1.6rem,7.5vw,5.5rem);line-height:1.3;font-weight:400;color:var(--white);margin-bottom:1.6rem;direction:rtl;font-family:'Amiri',serif;text-shadow:0 0 45px rgba(10,210,124,0.22);max-width:100%;}
.translit{font-style:italic;font-size:1.2rem;color:var(--green);margin-bottom:.7rem;}
.translation{font-size:1.08rem;color:rgba(255,255,255,0.72);max-width:56ch;line-height:1.55;}
.bismillah .small-label{font-size:.95rem;color:var(--green);font-weight:600;margin-bottom:2rem;letter-spacing:.02em;}

/* ── 6 · Principles (numbered list, no side-stripe) ── */
.principles{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem 3rem;margin-top:2rem;}
.pr{display:flex;gap:1.2rem;align-items:flex-start;border-top:2px solid var(--line-dark);padding-top:1.2rem;}
.pr .pr-n{font-family:'Poppins';font-weight:800;font-size:1.9rem;color:var(--teal-ink);line-height:.9;flex-shrink:0;}
.pr h3{font-size:1.22rem;font-weight:700;color:#0c2a25;margin-bottom:.45rem;line-height:1.2;}
.pr p{font-size:.96rem;line-height:1.55;color:var(--gray-soft);}

/* ── 7 · The map / spectrum ── */
.spectrum{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:2.2rem;border:1px solid var(--line);border-radius:18px;overflow:hidden;}
.lvl-col{display:flex;flex-direction:column;padding:1.8rem 1.7rem;border-left:1px solid var(--line);position:relative;transition:background .3s var(--ease);}
.lvl-col:first-child{border-left:none;}
.lvl-col:hover{background:rgba(255,255,255,0.03);}
.lvl-col .tag{font-family:'JetBrains Mono';font-weight:600;font-size:.74rem;letter-spacing:.04em;color:var(--green);text-transform:uppercase;margin-bottom:1rem;}
.lvl-col .verb{font-family:'Poppins';font-weight:700;font-size:1.8rem;color:var(--white);margin-bottom:.25rem;}
.lvl-col .prod{font-size:.92rem;color:var(--blue);font-weight:600;margin-bottom:1rem;}
.lvl-col .desc{font-size:.94rem;line-height:1.55;color:rgba(255,255,255,0.72);margin-bottom:1rem;}
.lvl-col .does{font-size:.86rem;color:rgba(255,255,255,0.58);border-top:1px solid var(--line);padding-top:.9rem;margin-top:auto;}
.lvl-col .does b{color:var(--white);font-weight:600;}
.spectrum-axis{display:flex;align-items:center;gap:1rem;margin-top:1.4rem;font-size:.82rem;font-weight:600;color:rgba(255,255,255,0.5);}
.spectrum-axis .bar{flex:1;height:3px;background:var(--grad);border-radius:3px;}
.spectrum-axis .hi{color:var(--green);}

/* ── Level dividers ── */
.divider{background:linear-gradient(160deg,#041a17 0%,#06201d 55%,#0a2c27 100%);position:relative;overflow:hidden;}
.divider::before{content:"";position:absolute;right:-6%;top:50%;transform:translateY(-50%);width:520px;height:520px;border-radius:50%;background:var(--grad-soft);filter:blur(24px);opacity:.65;}
.divider-inner{position:relative;z-index:2;max-width:1180px;margin:0 auto;width:100%;}
.divider .lvl-kicker{font-family:'JetBrains Mono';font-weight:600;font-size:1rem;letter-spacing:.06em;color:var(--green);margin-bottom:1rem;}
.divider .big{font-size:clamp(3rem,7.2vw,5.4rem);font-weight:700;line-height:1;letter-spacing:-.035em;color:var(--white);margin-bottom:1.1rem;}
.divider .sub{font-size:1.28rem;color:rgba(255,255,255,0.78);max-width:62ch;line-height:1.5;}
.divider .trigger{margin-top:2rem;display:flex;align-items:flex-start;gap:1rem;max-width:66ch;border-top:1px solid var(--line);padding-top:1.3rem;}
.divider .trigger .k{font-family:'Poppins';font-weight:700;color:var(--green);font-size:.78rem;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;padding-top:.2rem;}
.divider .trigger .v{font-size:1.02rem;color:rgba(255,255,255,0.85);line-height:1.5;}

/* ── Feature list ── */
.feature-list{display:flex;flex-direction:column;gap:0;margin-top:1.5rem;}
.feature{border-top:1px solid var(--line-dark);padding:1.05rem 0;}
.dark .feature{border-top-color:var(--line);}
.feature .ft{font-family:'Poppins';font-weight:600;font-size:1.1rem;color:#0c2a25;margin-bottom:.25rem;}
.dark .feature .ft{color:var(--white);}
.feature .fd{font-size:.96rem;line-height:1.55;color:var(--gray-soft);max-width:64ch;}
.dark .feature .fd{color:rgba(255,255,255,0.66);}

/* ── Prompt ladder (good / better / best) ── */
.ladder{display:flex;flex-direction:column;gap:1.1rem;margin-top:1.5rem;}
.rung{display:grid;grid-template-columns:88px 1fr;gap:1.3rem;align-items:start;border-top:1px solid var(--line-dark);padding-top:1.1rem;}
.rung .rung-label{font-family:'Poppins';font-weight:700;font-size:.88rem;padding:.32rem 0;text-align:center;border-radius:8px;}
.rung.good .rung-label{background:rgba(93,107,103,0.16);color:var(--gray-soft);}
.rung.better .rung-label{background:rgba(39,170,225,0.16);color:var(--blue-deep);}
.rung.best .rung-label{background:var(--grad-soft);color:var(--teal-ink);}
.rung-prompt{font-family:'JetBrains Mono';font-size:.9rem;line-height:1.5;color:#0c2a25;background:#e7efec;border-radius:10px;padding:.75rem .95rem;margin-bottom:.5rem;}
.rung-why{font-size:.94rem;line-height:1.5;color:var(--gray-soft);}
.rung-why b{color:var(--teal-ink);font-weight:700;}

/* ── Definition list (building blocks) ── */
.defs{margin-top:1.5rem;}
.def{display:grid;grid-template-columns:240px 1fr;gap:2.2rem;padding:1.2rem 0;border-bottom:1px solid var(--line-dark);}
.def:first-child{border-top:1px solid var(--line-dark);}
.def dt{font-family:'Poppins';font-weight:700;font-size:1.22rem;color:#0c2a25;display:flex;align-items:center;gap:.6rem;}
.def dt .dot{width:9px;height:9px;border-radius:50%;background:var(--grad);flex-shrink:0;}
.def dd{font-size:1rem;line-height:1.55;color:var(--gray-soft);}
.bridge-note{margin-top:1.7rem;font-size:1.02rem;line-height:1.55;color:var(--teal-ink);font-weight:500;max-width:70ch;}
.bridge-note b{color:#0c2a25;}
.duo{display:grid;grid-template-columns:1fr 1fr;gap:2.8rem;margin-top:1.6rem;}
.duo-h{font-family:'Poppins';font-weight:700;font-size:1.18rem;color:#0c2a25;margin-bottom:.3rem;}
.duo .defs{margin-top:0;}
.duo .def{grid-template-columns:1fr;gap:.2rem;padding:.85rem 0;}
.duo .def:first-child{border-top:none;}
.duo .def dt{font-size:1.05rem;}
.duo .def dd{font-size:.93rem;line-height:1.5;}

/* ── Terminal-style concepts (Code section) ── */
.terminal{margin-top:1.6rem;background:#04211b;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.terminal-bar{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;border-bottom:1px solid var(--line-2);}
.terminal-bar .tdot{width:11px;height:11px;border-radius:50%;}
.terminal-bar .r{background:#ff5f57;}.terminal-bar .y{background:#febc2e;}.terminal-bar .g{background:#28c840;}
.terminal-bar .ttl{margin-left:.6rem;font-family:'JetBrains Mono';font-size:.78rem;color:rgba(255,255,255,0.45);}
.terminal-body{display:grid;grid-template-columns:1fr 1fr;gap:0;}
.tline{padding:1.2rem 1.4rem;border-top:1px solid var(--line-2);border-left:1px solid var(--line-2);}
.terminal-body .tline:nth-child(-n+2){border-top:none;}
.terminal-body .tline:nth-child(odd){border-left:none;}
.tline .cmd{font-family:'JetBrains Mono';font-weight:600;font-size:1.02rem;color:var(--green);margin-bottom:.5rem;}
.tline .cmd .prompt{color:var(--blue);}
.tline p{font-size:.94rem;line-height:1.5;color:rgba(255,255,255,0.7);}

/* ── vs comparison ── */
.vs-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:1.6rem;align-items:stretch;margin-top:1.8rem;}
.vs-card{border:1px solid var(--line-dark);border-radius:16px;padding:1.5rem 1.6rem;background:var(--white);}
.dark .vs-card{background:rgba(255,255,255,0.03);border-color:var(--line);}
.vs-card .vh{font-family:'JetBrains Mono';font-size:.74rem;letter-spacing:.04em;text-transform:uppercase;color:var(--teal-ink);margin-bottom:.6rem;}
.dark .vs-card .vh{color:var(--green);}
.vs-card h4{font-family:'Poppins';font-weight:700;font-size:1.18rem;color:#0c2a25;margin-bottom:.5rem;}
.dark .vs-card h4{color:var(--white);}
.vs-card p{font-size:.96rem;line-height:1.55;color:var(--gray-soft);}
.dark .vs-card p{color:rgba(255,255,255,0.68);}
.vs-mid{display:flex;align-items:center;font-family:'Poppins';font-weight:800;color:var(--blue);font-size:1.4rem;}

.callout{margin-top:1.8rem;background:var(--grad-soft);border:1px solid rgba(10,210,124,0.28);border-radius:14px;padding:1.1rem 1.4rem;font-size:1.02rem;line-height:1.55;color:#0c2a25;display:flex;gap:.85rem;align-items:flex-start;}
.dark .callout{color:rgba(255,255,255,0.9);}
.callout b{color:var(--teal-ink);}
.dark .callout b{color:var(--green);}

/* ── Demo launchpad ── */
.demo{background:linear-gradient(160deg,#041a17 0%,#06201d 55%,#0a2c27 100%);position:relative;overflow:hidden;}
.demo::before{content:"";position:absolute;left:-10%;bottom:-22%;width:480px;height:480px;border-radius:50%;background:var(--grad-soft);filter:blur(32px);opacity:.55;}
.demo-inner{position:relative;z-index:2;max-width:1180px;margin:0 auto;width:100%;}
.demo-badge{display:inline-flex;align-items:center;gap:.6rem;font-family:'JetBrains Mono';font-weight:600;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;color:#04211b;background:var(--grad);padding:.5rem 1.1rem;border-radius:100px;margin-bottom:1.4rem;}
.demo-badge .pulse{width:9px;height:9px;border-radius:50%;background:#04211b;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.2;}}
@media (prefers-reduced-motion: reduce){.demo-badge .pulse{animation:none;}}

/* tiny markup: *accent*  **bold**  _italic_  (HTML is escaped first) */
function fmt(raw){
  if(raw===false||raw===null||raw===undefined) return '';
  const e=String(raw).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return e
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<span class="accent">$1</span>')
    .replace(/_([^_]+)_/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}
const li=arr=>arr.map(x=>`<li>${fmt(x)}</li>`).join('');
/* opt: render the html only if the value is set (false/empty/missing => nothing) */

function showError(detail){
  const el=document.createElement('div');
  el.className='deck-error';
  el.innerHTML='<b>The deck couldn’t load deck.js.</b> This is almost always a small typo, usually a missing comma or quote. Fix it in deck.js and reload. Details: <code>'+String(detail).replace(/</g,'&lt;')+'</code>';
  document.body.appendChild(el);
}

/* ── render the deck from data ── */
function renderDeck(){
  if(typeof window.DECK==='undefined' || !Array.isArray(window.DECK)) throw new Error('DECK is missing or not a list.');
  const html = window.DECK.map((s,i)=>{
    const tpl=T[s.type];
    if(!tpl) throw new Error('Slide '+(i+1)+': unknown type "'+s.type+'".');
    return tpl(s);
  }).join('\n');
  document.getElementById('deck').innerHTML = html;
}
function wireReveal(){
  if(!window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{ if(entry.isIntersecting) entry.target.classList.add('visible'); });
    },{threshold:0.06,rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>observer.observe(el));
  } else {
    document.querySelectorAll('.reveal').forEach(el=>el.classList.add('visible'));
  }
}

/* ── navigation / present mode ── */
const nav=document.getElementById('nav');
window.addEventListener('scroll',()=>{ nav.classList.toggle('scrolled',window.scrollY>20); });

function getSnapTargets(){ return Array.from(document.querySelectorAll('.hero, .slide')); }
function getCurrentSlideIndex(){
  const t=getSnapTargets(); let best=0,bd=Infinity;
  for(let i=0;i<t.length;i++){ const d=Math.abs(t[i].getBoundingClientRect().top); if(d<bd){bd=d;best=i;} }
  return best;
}
function updateIndicator(){
  const t=getSnapTargets(); if(!t.length) return; const i=getCurrentSlideIndex();
  document.getElementById('slideIndicator').textContent=`${i+1} / ${t.length}`;
  const id=t[i].id||null;
  document.querySelectorAll('.nav-links a').forEach(a=>{ a.classList.toggle('active', id?a.getAttribute('href')==='#'+id:false); });
}
function togglePresent(forceOff){
  const html=document.documentElement; const btn=document.getElementById('presentBtn');
  const entering=forceOff?false:!html.classList.contains('present-mode');
  const idx=entering?getCurrentSlideIndex():null;
  html.classList.toggle('present-mode',entering);
  btn.textContent=entering?'Exit':'Present';
  try{ window.parent.postMessage({type:'presentMode',on:entering},'*'); }catch(e){}
  if(entering){ const target=getSnapTargets()[idx]; requestAnimationFrame(()=>{ target.scrollIntoView({behavior:'instant'}); updateIndicator(); }); }
}
function goToSlide(dir){
  const t=getSnapTargets(); const i=Math.max(0,Math.min(getCurrentSlideIndex()+dir,t.length-1));
  t[i].scrollIntoView({behavior:'smooth'}); setTimeout(updateIndicator,350);
}
/* advance reveals the next build step on the current slide before moving to the next slide */
function advance(dir){
  const cur=getSnapTargets()[getCurrentSlideIndex()];
  if(cur){
    if(dir>0){
      const nextStep=cur.querySelector('.step:not(.step-shown)');
      if(nextStep){ nextStep.classList.add('step-shown'); return; }
    } else {
      const shown=cur.querySelectorAll('.step.step-shown');
      if(shown.length){ shown[shown.length-1].classList.remove('step-shown'); return; }
    }
  }
  goToSlide(dir);
}
document.addEventListener('keydown',e=>{
  const inP=document.documentElement.classList.contains('present-mode');
  if((e.key==='p'||e.key==='P')&&!e.target.matches('input,textarea,[contenteditable="true"]')){ e.preventDefault(); togglePresent(); return; }
  if(e.key==='Escape'&&inP){ togglePresent(true); return; }
  if(!inP) return;
  const next=['ArrowDown','ArrowRight','PageDown',' '].includes(e.key);
  const prev=['ArrowUp','ArrowLeft','PageUp'].includes(e.key);
  if(next||prev){ e.preventDefault(); advance(next?1:-1); }
});
let wheelLocked=false;
document.addEventListener('wheel',e=>{
  if(!document.documentElement.classList.contains('present-mode')) return;
  e.preventDefault(); if(wheelLocked) return; wheelLocked=true;
  advance(e.deltaY>0?1:-1); setTimeout(()=>{wheelLocked=false;},700);
},{passive:false});
window.addEventListener('scroll',()=>{ if(!document.documentElement.classList.contains('present-mode')) updateIndicator(); });

/* ── load deck.js fresh every visit (cache-busted), then render ── */
(async function boot(){
  try{
    const res = await fetch('deck.js?v='+Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('couldn’t fetch deck.js (HTTP '+res.status+')');
    (new Function(await res.text()))();   // executes deck.js -> sets window.DECK
    renderDeck();
    wireReveal();
    updateIndicator();
  }catch(err){
    showError(err.message||err);
  }
})();
</script>
